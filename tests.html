<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicVault - Test Suite</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Mocha styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .header-container {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-title {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(to right, #818cf8, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.8rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: -0.025em;
        }
        .header-subtitle {
            font-family: 'Inter', sans-serif;
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #a5b4fc;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            padding: 10px 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .back-link:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        #mocha {
            background: rgba(30, 41, 59, 0.45) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 20px !important;
            padding: 30px !important;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5) !important;
            margin: 0 auto 40px auto !important;
            max-width: 1000px !important;
            color: #e2e8f0 !important;
        }
        
        #mocha h1 {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
            font-size: 24px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding-bottom: 15px !important;
            margin-top: 0 !important;
        }
        #mocha h1 a {
            color: #818cf8 !important;
            text-decoration: none !important;
            transition: color 0.2s ease !important;
        }
        #mocha h1 a:hover {
            color: #a5b4fc !important;
        }
        
        #mocha .suite {
            margin-left: 0 !important;
            padding: 10px 0 !important;
        }
        
        #mocha .suite h1 {
            font-family: 'Outfit', sans-serif !important;
            font-size: 18px !important;
            font-weight: 600 !important;
            color: #c084fc !important;
            border-bottom: none !important;
            margin-top: 15px !important;
            margin-bottom: 10px !important;
            padding-bottom: 0 !important;
        }
        
        #mocha .test {
            margin-left: 20px !important;
            padding: 10px 16px !important;
            border-radius: 8px !important;
            background: rgba(255, 255, 255, 0.02) !important;
            margin-bottom: 6px !important;
            border: 1px solid rgba(255, 255, 255, 0.03) !important;
            transition: all 0.2s ease !important;
            display: block !important;
        }
        
        #mocha .test:hover {
            background: rgba(255, 255, 255, 0.04) !important;
            border-color: rgba(255, 255, 255, 0.06) !important;
        }
        
        #mocha .test h2 {
            font-family: 'Inter', sans-serif !important;
            font-size: 14px !important;
            font-weight: 400 !important;
            color: #e2e8f0 !important;
            margin: 0 !important;
            display: inline-block !important;
        }
        
        #mocha .test.pass h2 {
            border-left: 3px solid #10b981 !important;
            padding-left: 10px !important;
        }
        #mocha .test.pass::after {
            color: #10b981 !important;
            font-size: 16px !important;
            content: ' ✓' !important;
            font-weight: bold !important;
        }
        
        #mocha .test.fail h2 {
            border-left: 3px solid #ef4444 !important;
            padding-left: 10px !important;
            font-weight: 500 !important;
        }
        #mocha .test.fail::after {
            color: #ef4444 !important;
            font-size: 16px !important;
            content: ' ✗' !important;
            font-weight: bold !important;
        }
        
        #mocha .test.fail pre {
            background: rgba(239, 68, 68, 0.08) !important;
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            border-radius: 8px !important;
            padding: 12px !important;
            color: #fca5a5 !important;
            font-family: monospace !important;
            font-size: 13px !important;
            margin-top: 8px !important;
        }
        
        #mocha .test.fail .error {
            color: #fca5a5 !important;
            font-weight: 600 !important;
        }
        
        #mocha .test .duration {
            font-size: 12px !important;
            color: #64748b !important;
            float: right !important;
        }
        
        #mocha-stats {
            position: fixed !important;
            top: 30px !important;
            right: 30px !important;
            z-index: 10000 !important;
            background: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(99, 102, 241, 0.25) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
            border-radius: 16px !important;
            padding: 16px 20px !important;
            color: #f8fafc !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 500 !important;
            height: auto !important;
            width: 150px !important;
            list-style: none !important;
            margin: 0 !important;
        }
        #mocha-stats li {
            margin-bottom: 8px !important;
            font-size: 14px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            float: none !important;
            width: auto !important;
        }
        #mocha-stats li:last-child {
            margin-bottom: 0 !important;
        }
        #mocha-stats em {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
            font-style: normal !important;
            display: inline-block !important;
            padding: 2px 8px !important;
            border-radius: 6px !important;
        }
        #mocha-stats .passes em {
            color: #10b981 !important;
            background: rgba(16, 185, 129, 0.15) !important;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3) !important;
        }
        #mocha-stats .failures em {
            color: #f43f5e !important;
            background: rgba(244, 63, 94, 0.15) !important;
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.3) !important;
        }
        #mocha-stats .duration em {
            color: #38bdf8 !important;
            background: rgba(56, 189, 248, 0.15) !important;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1 class="header-title">ComicVault Test Runner</h1>
        <p class="header-subtitle">In-Browser Unit Tests mit Mocha & Chai</p>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Zurück zur App</a>
    </div>

    <!-- Mocha output div -->
    <div id="mocha"></div>

    <!-- Mock UI Elements for load-time DOM selections in views -->
    <div style="display: none;">
        <div id="comic-modal"></div>
        <form id="comic-form"></form>
        <button id="btn-close-modal"></button>
        <button id="btn-cancel-modal"></button>
        <button id="btn-save-comic"></button>
        <button id="btn-delete-comic"></button>
        <div id="modal-title"></div>
    </div>

    <!-- Firebase Compatibility APIs for Mock/Import requirements -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <!-- SheetJS (XLSX) Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Mocha & Chai scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/4.3.7/chai.min.js"></script>

    <script>
        // Setup BDD-style interface
        mocha.setup('bdd');
    </script>

    <!-- Test Suites -->
    <script type="module" src="./js/tests/utils.test.js"></script>
    <script type="module" src="./js/tests/ui.test.js"></script>
    <script type="module" src="./js/tests/autocomplete.test.js"></script>
    <script type="module" src="./js/tests/bulkdelete.test.js"></script>
    <script type="module" src="./js/tests/bulkedit.test.js"></script>
    <script type="module" src="./js/tests/import.test.js"></script>
    <script type="module" src="./js/tests/changelog.test.js"></script>
    <script type="module" src="./js/tests/responsive.test.js"></script>
    <script type="module" src="./js/tests/theme.test.js"></script>
    <script type="module" src="./js/tests/wishlist.test.js"></script>

    <script type="module">
        // Run tests
        mocha.run();
    </script>
</body>
</html>
